# SkyWars Plugin Konfiguration
min-players: 2
lobby-countdown-seconds: 60
countdown-seconds: 10

# Lobby-Spawn (wird per /skywars setlobby gesetzt)
lobby-spawn:
  world: world
  x: 0.0
  y: 64.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0

# Team-Insel-Spawns (werden per /skywars setisland <team> gesetzt)
island-spawns:
  red:
    world: world
    x: 100.0
    y: 120.0
    z: 0.0
    yaw: 0.0
    pitch: 0.0
  blue:
    world: world
    x: -100.0
    y: 120.0
    z: 0.0
    yaw: 180.0
    pitch: 0.0
  green:
    world: world
    x: 0.0
    y: 120.0
    z: 100.0
    yaw: 270.0
    pitch: 0.0
  yellow:
    world: world
    x: 0.0
    y: 120.0
    z: -100.0
    yaw: 90.0
    pitch: 0.0
